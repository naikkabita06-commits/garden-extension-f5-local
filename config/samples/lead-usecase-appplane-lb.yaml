apiVersion: v1
kind: Namespace
metadata:
  name: demo-lead-lb
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pod-ident-server
  namespace: demo-lead-lb
data:
  server.py: |
    import os
    import sys
    from http.server import BaseHTTPRequestHandler, HTTPServer

    POD_NAME = os.getenv("POD_NAME", os.getenv("HOSTNAME", "unknown"))
    POD_IP = os.getenv("POD_IP", "unknown")
    PORT = int(os.getenv("PORT", "8080"))

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            msg = f"pod={POD_NAME} ip={POD_IP} path={self.path}\n"
            # console log per request
            sys.stdout.write(msg)
            sys.stdout.flush()
            self.send_response(200)
            self.send_header("Content-Type", "text/plain")
            self.end_headers()
            self.wfile.write(msg.encode("utf-8"))

        def log_message(self, format, *args):
            # suppress default noisy logs; we print our own line above
            return

    HTTPServer(("0.0.0.0", PORT), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-ident
  namespace: demo-lead-lb
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pod-ident
  template:
    metadata:
      labels:
        app: pod-ident
    spec:
      containers:
      - name: server
        image: python:3.12-alpine
        imagePullPolicy: IfNotPresent
        env:
        - name: PORT
          value: "8080"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        ports:
        - containerPort: 8080
          name: http
        volumeMounts:
        - name: code
          mountPath: /app
        command: ["python", "/app/server.py"]
      volumes:
      - name: code
        configMap:
          name: pod-ident-server
---
apiVersion: v1
kind: Service
metadata:
  name: pod-ident-lb
  namespace: demo-lead-lb
  annotations:
    # The bridge watches Service type=LoadBalancer and expects this VIP annotation.
    cis.f5.com/ip: 100.72.200.20
spec:
  type: LoadBalancer
  loadBalancerClass: f5.extensions.gardener.cloud/bigip
  selector:
    app: pod-ident
  ports:
  - name: http
    port: 8085
    targetPort: 8080
    protocol: TCP
